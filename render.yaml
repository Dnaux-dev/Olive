services:
  # Backend FastAPI service
  - type: web
    name: olive-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_PATH
        value: ./data/medi_sync.db # Stored in instance memory (wiped on restart)
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: FIREBASE_SERVICE_ACCOUNT_KEY_PATH
        value: /etc/secrets/firebase-credentials.json
      - key: GOOGLE_APPLICATION_CREDENTIALS
        value: /etc/secrets/lifecare.json
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

  # Frontend Next.js service
  - type: web
    name: olive-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: olive-backend
          type: web
          property: host
